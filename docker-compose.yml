services:
  mysql:
    image: mysql:8.0
    container_name: produtoapi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Dev@User123
      MYSQL_DATABASE: produto_db
    ports:
      - "3307:3306"
    volumes:
      - produtoapi_mysql_data:/var/lib/mysql

  produtoapi:
    build: .
    container_name: produtoapi-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=produto_db;user=root;password=Dev@User123;"
    depends_on:
      - mysql
    restart: on-failure

volumes:
  produtoapi_mysql_data: